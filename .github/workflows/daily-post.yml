name: Post diário do blog

on:
  schedule:
          # 13:18 UTC = 10:18 no horario de Brasilia (UTC-3)
          - cron: "18 13 * * *" # Executa as 10:18 BRT
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions

# Necessário para o passo final conseguir commitar de volta os arquivos
# de estado (content-calendar.json / post-history.json).
permissions:
  contents: write

# Evita que duas execuções rodem ao mesmo tempo e peguem o mesmo tema.
concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar pipeline (gera e publica o post do dia)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_ADMIN_EMAIL: ${{ secrets.FIREBASE_ADMIN_EMAIL }}
          FIREBASE_ADMIN_PASSWORD: ${{ secrets.FIREBASE_ADMIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          IMAGE_GEN_API_KEY: ${{ secrets.IMAGE_GEN_API_KEY }}
          IMAGE_GEN_PROVIDER: openai
        run: npm run run

      # Roda mesmo se o pipeline falhar, para registrar a execução (com o
      # erro) em runs-history.json e o painel conseguir mostrar a falha.
      - name: Commitar estado atualizado (calendário, histórico e execuções)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-calendar.json post-history.json runs-history.json
          if git diff --staged --quiet; then
            echo "Nada mudou no estado — nenhum commit necessário."
          else
            git commit -m "chore: registro de execução do pipeline [skip ci]"

            # A main pode receber outro commit enquanto o pipeline roda.
            # Sincroniza o commit gerado e repete se houver uma corrida entre
            # o rebase e o push.
            for tentativa in 1 2 3; do
              echo "Tentativa ${tentativa} de publicar o estado..."

              if git pull --rebase origin main; then
                if git push origin HEAD:main; then
                  exit 0
                fi
              else
                # Limpa um possível rebase com conflito antes de repetir.
                git rebase --abort || true
              fi

              sleep 5
            done

            echo "Não foi possível publicar o estado após 3 tentativas."
            exit 1
          fi

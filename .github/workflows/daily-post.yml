name: Post diário do blog

on:
  schedule:
    # 12:00 UTC = 09:00 no horário de Brasília (UTC-3)
    - cron: "0 12 * * *"
  workflow_dispatch: {} # permite disparar manualmente pela aba Actions

# Necessário para o passo final conseguir commitar de volta os arquivos
# de estado (content-calendar.json / post-history.json).
permissions:
  contents: write

# Evita que duas execuções rodem ao mesmo tempo e peguem o mesmo tema.
concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: DEBUG - conferir integridade do secret (remover depois)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "len: ${#ANTHROPIC_API_KEY}"
          echo "sha256: $(printf '%s' "$ANTHROPIC_API_KEY" | sha256sum | cut -d' ' -f1)"

      - name: Rodar pipeline (gera e publica o post do dia)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_ADMIN_EMAIL: ${{ secrets.FIREBASE_ADMIN_EMAIL }}
          FIREBASE_ADMIN_PASSWORD: ${{ secrets.FIREBASE_ADMIN_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          IMAGE_GEN_API_KEY: ${{ secrets.IMAGE_GEN_API_KEY }}
          IMAGE_GEN_PROVIDER: openai
        run: npm run run

      - name: Commitar estado atualizado (calendário e histórico)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-calendar.json post-history.json
          if git diff --staged --quiet; then
            echo "Nada mudou no estado — nenhum commit necessário."
          else
            git commit -m "chore: post diário publicado [skip ci]"
            git push
          fi

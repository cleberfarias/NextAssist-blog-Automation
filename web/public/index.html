<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Escritório NextAssist — automação de conteúdo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-logo">🏢</span>
      <div>
        <h1>Escritório NextAssist</h1>
        <p id="topic-line">Aguardando o próximo tema...</p>
      </div>
    </div>
    <button id="run-btn">▶ Rodar pipeline agora</button>
  </header>

  <main class="office">
    <div class="floor" id="floor">
      <!-- mesas inseridas via JS -->
    </div>
  </main>

  <aside class="history-panel">
    <h2>Posts publicados</h2>
    <ul id="history-list"><li class="empty">Nenhum post publicado ainda.</li></ul>
  </aside>

  <section class="runs-panel">
    <div class="runs-header">
      <h2>Execuções recentes</h2>
      <span id="runs-updated"></span>
    </div>
    <ul id="runs-list"><li class="empty">Carregando execuções...</li></ul>
  </section>

  <section class="performance-panel">
    <div class="perf-header">
      <h2>Desempenho no Google</h2>
      <div class="perf-meta">
        <span id="perf-updated">Nunca atualizado</span>
        <button id="refresh-perf-btn">↻ Atualizar métricas</button>
      </div>
    </div>
    <div class="perf-table-wrap">
      <table id="perf-table">
        <thead>
          <tr>
            <th>Post</th>
            <th>Indexado</th>
            <th>Cliques</th>
            <th>Impressões</th>
            <th>CTR</th>
            <th>Posição</th>
          </tr>
        </thead>
        <tbody id="perf-body">
          <tr class="empty"><td colspan="6">Sem dados ainda. Clique em "Atualizar métricas".</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
